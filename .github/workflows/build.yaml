name: Compile Tempest

on: [push]

jobs:
  cpp-linux-build:
    name: Build Linux
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
        config: [ Debug, Release, RelWithDebugInfo ]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Update apt-get
        run: sudo apt-get update -y
      - name: Configure Ubuntu Libraries
        run: sudo apt-get install -y libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev mesa-common-dev
      - name: Install Clang 22
        uses: egor-tensin/setup-clang@v2.2
        with:
          version: 22
          platform: x64
      - name: Install Premake
        uses: Jarod42/install-premake5@v4
        with:
          ref: master
      - name: Generate Project Files
        run: premake5 ninja --cc=clang --shell=posix --shared-engine
      - name: Fetch Dependencies
        run: premake5 fetch
      - name: Build
        run: ninja -C build/ninja ${{ matrix.config }}_x64
      - name: Run Tests
        run: ninja -C build/ninja test_${{ matrix.config }}_x64

  cpp-windows-build:
    name: Build Windows
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ windows-2022, windows-2025-vs2026 ]
        config: [ Debug, Release, RelWithDebugInfo ]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Install Premake
        uses: Jarod42/install-premake5@v4
        with:
          ref: master
      - name: Generate Project Files
        run: premake5 ${{ case(matrix.os == 'windows-2022', 'vs2022', 'vs2026') }} --shared-engine
      - name: Fetch Dependencies
        run: premake5 fetch
      - name: Build
        run: |
          msbuild build/${{ case(matrix.os == 'windows-2022', 'vs2022', 'vs2026') }}/Tempest.${{ case(matrix.os == 'windows-2022', 'sln', 'slnx') }} -p:Configuration=${{ matrix.config }} -p:Platform=x64 -m
